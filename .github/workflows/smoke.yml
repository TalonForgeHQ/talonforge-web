name: Smoke tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Every 6h against prod, catches CDN / Vercel regressions
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run smoke tests
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: https://www.talonforge.xyz
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
