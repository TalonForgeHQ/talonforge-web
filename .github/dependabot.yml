version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore(deps)
      prefix-development: chore(deps-dev)
      include: scope
    groups:
      next:
        patterns:
          - next
          - eslint-config-next
          - "@next/*"
      react:
        patterns:
          - react
          - react-dom
          - "@types/react*"
      tailwind:
        patterns:
          - tailwindcss
          - "@tailwindcss/*"
      playwright:
        patterns:
          - "@playwright/*"
      types:
        patterns:
          - "@types/*"
    ignore:
      # Major bumps on these require manual migration; we review separately.
      - dependency-name: next
        update-types: ["version-update:semver-major"]
      - dependency-name: react
        update-types: ["version-update:semver-major"]
      - dependency-name: react-dom
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: chore(ci)
      include: scope
    open-pull-requests-limit: 5
